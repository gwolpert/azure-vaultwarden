name: Deploy Vaultwarden to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: environment
        default: 'dev'
  push:
    branches:
      - main
    paths:
      - 'bicep/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover GitHub runner public IP
        id: runner-ip
        run: |
          RUNNER_IP=$(curl -fsSL --retry 3 https://api.ipify.org)
          if [ -z "$RUNNER_IP" ]; then
            echo "Failed to determine runner public IP" >&2
            exit 1
          fi
          echo "Runner public IP: $RUNNER_IP"
          echo "ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "cidr=${RUNNER_IP}/32" >> $GITHUB_OUTPUT

      - name: Build Key Vault allow-list (runner + extras)
        id: kv-allowlist
        env:
          EXTRA_IPS: ${{ vars.KEY_VAULT_ALLOWED_IPS }}
          RUNNER_CIDR: ${{ steps.runner-ip.outputs.cidr }}
        run: |
          # Combine the runner IP with any operator-configured IPs (comma separated CIDRs).
          # Emit a Bicep array literal: ['1.2.3.4/32','5.6.7.8/32']
          IFS=',' read -ra EXTRAS <<< "${EXTRA_IPS:-}"
          ITEMS="'${RUNNER_CIDR}'"
          for ip in "${EXTRAS[@]}"; do
            trimmed=$(echo "$ip" | xargs)
            if [ -n "$trimmed" ]; then
              ITEMS="${ITEMS},'${trimmed}'"
            fi
          done
          echo "array=[${ITEMS}]" >> $GITHUB_OUTPUT

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          scope: subscription
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          region: ${{ vars.AZURE_LOCATION }}
          template: ./bicep/main.bicep
          parameters: >
            resourceGroupName=${{ vars.RESOURCE_GROUP_NAME }}
            location=${{ vars.AZURE_LOCATION }}
            environmentName=${{ vars.ENVIRONMENT_NAME }}
            domainName=${{ vars.DOMAIN_NAME }}
            adminToken=${{ secrets.ADMIN_TOKEN }}
            signupsAllowed=${{ vars.SIGNUPS_ALLOWED }}
            vaultwardenImageTag=${{ vars.VAULTWARDEN_IMAGE_TAG }}
            appServicePlanSkuName=${{ vars.APP_SERVICE_PLAN_SKU_NAME || 'B1' }}
            postgresqlAdminPassword=${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}
            keyVaultAllowedIpAddresses=${{ steps.kv-allowlist.outputs.array }}
            adminAllowedIpAddresses=${{ vars.ADMIN_ALLOWED_IPS_BICEP_ARRAY || '[]' }}
          failOnStdErr: false
          deploymentName: vaultwarden-deployment-${{ github.run_number }}

      - name: Remove runner IP from Key Vault allow-list
        if: always() && steps.deploy.outputs.keyVaultName != ''
        env:
          KV_NAME: ${{ steps.deploy.outputs.keyVaultName }}
          RUNNER_IP: ${{ steps.runner-ip.outputs.ip }}
        run: |
          echo "Removing runner IP $RUNNER_IP from Key Vault $KV_NAME network rules"
          az keyvault network-rule remove \
            --name "$KV_NAME" \
            --ip-address "$RUNNER_IP" \
            --only-show-errors || echo "Cleanup failed; remove $RUNNER_IP manually if it remains"

      - name: Display deployment outputs
        run: |
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Vaultwarden URL:** ${{ steps.deploy.outputs.vaultwardenUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** ${{ steps.deploy.outputs.resourceGroupName }}" >> $GITHUB_STEP_SUMMARY
          echo "**App Service:** ${{ steps.deploy.outputs.appServiceName }}" >> $GITHUB_STEP_SUMMARY
          echo "**App Service Plan:** ${{ steps.deploy.outputs.appServicePlanName }}" >> $GITHUB_STEP_SUMMARY
          echo "**PostgreSQL Server:** ${{ steps.deploy.outputs.postgresqlServerName }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Access your Vaultwarden instance at: ${{ steps.deploy.outputs.vaultwardenUrl }}" >> $GITHUB_STEP_SUMMARY

      - name: Verify deployment
        run: |
          echo "Waiting for application to be ready..."
          sleep 30
          
          APP_URL="${{ steps.deploy.outputs.vaultwardenUrl }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Application is responding (HTTP $HTTP_CODE)"
            echo "### Verification Passed! ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Application returned HTTP $HTTP_CODE"
            echo "### Verification Warning ⚠️" >> $GITHUB_STEP_SUMMARY
            echo "Application returned HTTP $HTTP_CODE - It may take a few minutes to fully start" >> $GITHUB_STEP_SUMMARY
          fi
